<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style/style_new.css">
    <title>臺灣BL漫畫資料庫</title>
</head>
<body>
    <div class="page">
        <nav>
            <img class="icon" src="/src/imgs/archive.svg" alt="">
            <h1 class="title ">臺灣BL漫畫資料庫</h1>
            <h2 class="sub-title">Taiwan BL Comics Database</h2>
            <div class="menu">
                <div id="allBook" class="item item-selected item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">所有書籍</div>
                        <div class="item-english-name">ALL BOOKS</div>
                    </div>
                </div>
                <div id="kadokawaTaiwan" class="item item-default item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">台灣角川</div>
                        <div class="item-english-name">KADOKAWA TAIWAN</div>
                    </div>
                </div>
                <div id="chingWin" class="item item-default item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">青文出版</div>
                        <div class="item-english-name">CHING WIN PUBLISHING</div>
                    </div>
                </div>
                <div id="sharpPoint" class="item item-default item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">尖端媒體集團</div>
                        <div class="item-english-name">SHARP POINT MEDIA GROUP</div>
                    </div>
                </div>
                <div id="tongLi" class="item item-default item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">東立出版社</div>
                        <div class="item-english-name">TONG LI PUBLISHINIGS</div>
                    </div>
                </div>
                <div id="everGlory" class="item item-default item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">長鴻出版社</div>
                        <div class="item-english-name">EVER GLORY PUBLISHINIGS</div>
                    </div>
                </div>
                <div id="toHan" class="item item-default item-filter">
                    <div class="item-icon">
                        <img src="/src/imgs/codesandbox-logo.svg" alt="">
                    </div>
                    <div class="item-name">
                        <div class="item-name">台灣東販</div>
                        <div class="item-english-name">TAIWAN TOHAN</div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="content-wrap">
            <div class="tool-bar">
                <div class="search">
                    <form class="search-bar-form" action="" method="post" >
                        <div class="tool-icon">
                            <img src="/src/imgs/magnifying-glass.svg" alt="">
                        </div>
                        <input
                                type="text"
                                id="searchInput"
                                class="search-bar-input"
                                placeholder="請輸入欲搜尋書名"
                        >
                        <button type="button" class="search-bar-button" onclick="searchBook()">搜尋</button>
                    </form>
                </div>
                <div class="sort">
                    <div class="sort-item">
                        <div id="defaultSortItem" class="default-sort-item">
                            <div class="sort-name">
                                臺灣出版日期
                            </div>
                            <div class="tool-icon">
                                <img src="/src/imgs/mixer-horizontal.svg" alt="">
                            </div>
                        </div>
                        <div class="sort-list">
                            <ul>
                                <li id="sortByPublishedDate_tw">臺灣出版日期</li>
                                <li id="sortByPublishedDate_jp">日本出版日期</li>
                            </ul>
                        </div>
                    </div>
                    <div class="sort-method">
                        <div id="defaultSortMethod" class="default-sort-item">
                            <div class="sort-name">
                                降序
                            </div>
                            <div class="tool-icon">
                                <img src="/src/imgs/caret-down.svg" alt="">
                            </div>
                        </div>
                        <div class="sort-list">
                            <ul>
                                <li id="sortByDesc">降序</li>
                                <li id="sortByAsc">升序</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            <div id="contents" class="contents">
            </div>
        </div>
        <div id="book-detail-container" class="book-detail-container">

            <div id="bookDetail">

            </div>
        </div>
    </div>
</body>



<script src="/src/script/script.js"></script>
</html>
